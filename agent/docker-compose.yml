services:
  agent:
    build: .
    image: monitoring-agent:latest
    container_name: monitoring-agent
    network_mode: host
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - ./dane:/app/data/
    environment:
      - BACKEND_URL=ws://192.168.0.10:8080/ws/agent
