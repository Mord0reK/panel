# Panel — Full Stack
#
# Usage:
#   docker compose up -d
#   VERSION=1.2.3 docker compose up -d
#
# Required environment variables:
#   JWT_SECRET  — secret key for signing JWT tokens (no default, must be set)
#
# Optional environment variables:
#   VERSION          — image tag to pull (default: latest)
#   BACKEND_PORT     — host port for backend API (default: 8080)
#   FRONTEND_PORT    — host port for frontend UI (default: 3000)
#   CORS_ORIGIN      — allowed CORS origin (default: *)
#   DATABASE_PATH    — path inside backend container (default: /data/backend.db)

services:
  backend:
    image: ghcr.io/mord0rek/panel-backend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_PATH: ${DATABASE_PATH:-/data/backend.db}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - backend-data:/data

  frontend:
    image: ghcr.io/mord0rek/panel-frontend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

  agent:
    image: ghcr.io/mord0rek/panel-agent:${VERSION:-latest}
    restart: unless-stopped
    environment:
      BACKEND_URL: ws://backend:8080/ws/agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    pid: "host"
    depends_on:
      - backend

volumes:
  backend-data:
